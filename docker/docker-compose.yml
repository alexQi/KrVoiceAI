# EnlyAI 企业级 GPU 部署（8×RTX 3090）
#
# 拓扑：web(CPU) + 6×avatar worker(LatentSync, 钉 GPU0-5) + 2×tts(CosyVoice2, 钉 GPU6-7)
#
# 前置（宿主机一次性）：
#   bash docker/provision_models.sh          # 下载 CosyVoice2 / LatentSync 权重到 ./deploy_models
# 部署：
#   docker compose -f docker/docker-compose.yml build
#   docker compose -f docker/docker-compose.yml up -d
#
# 注意：单条视频多卡分片(scatter-gather)需 M2 的 gpu_pool 客户端；本编排先把 6 个常驻
# avatar worker + 2 个 tts 全部拉起（各占一卡），web 暂指向 avatar-0/tts-0。M2 落地后
# web 改指向 worker 池做多卡分片。

x-avatar-common: &avatar-common
  build:
    context: ..
    dockerfile: docker/Dockerfile.avatar
  image: krvoiceai:avatar
  restart: unless-stopped
  networks: [krvoiceai-net]
  volumes:
    - ./deploy_models/LatentSync/checkpoints:/opt/LatentSync/checkpoints
    - ../config/avatars:/app/config/avatars
  environment:
    - LATENTSYNC_MODE=resident
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8010/health')"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 180s

x-tts-common: &tts-common
  build:
    context: ..
    dockerfile: docker/Dockerfile.tts
  image: krvoiceai:tts
  restart: unless-stopped
  networks: [krvoiceai-net]
  volumes:
    - ./deploy_models/CosyVoice/pretrained_models:/opt/CosyVoice/pretrained_models
    - ../config/voices:/app/config/voices
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:9880/health')"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 180s

x-gpu: &gpu-reservation
  driver: nvidia
  capabilities: [gpu]

services:
  # ── Web / 编排（CPU）──
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.local
    image: krvoiceai:web
    container_name: krvoiceai-web
    ports:
      - "8000:8000"
    volumes:
      - ../workspace_data:/app/workspace_data
      - ../config:/app/config
    environment:
      - KRVOICEAI_GPU_RUNNER_AVATAR_ENDPOINT=http://avatar-0:8010
      - KRVOICEAI_GPU_RUNNER_TTS_ENDPOINT=http://tts-0:9880
      - KRVOICEAI_AVATAR_API_BASE=http://avatar-0:8010
      - KRVOICEAI_TTS_API_BASE=http://tts-0:9880
      - KRVOICEAI_AVATAR_PROVIDER=latentsync
      - KRVOICEAI_TTS_PROVIDER=cosyvoice
      # M2 单条视频多卡分片：开启 + 6 个 avatar worker 池
      - KRVOICEAI_AVATAR_SHARDING_ENABLED=true
      - KRVOICEAI_GPU_RUNNER_AVATAR_WORKERS=http://avatar-0:8010,http://avatar-1:8010,http://avatar-2:8010,http://avatar-3:8010,http://avatar-4:8010,http://avatar-5:8010
    networks: [krvoiceai-net]
    restart: unless-stopped
    command: ["python", "-m", "krvoiceai.web.server", "--host", "0.0.0.0", "--port", "8000"]

  # ── 6× LatentSync 常驻 worker（GPU 0-5）──
  avatar-0: {<<: *avatar-common, container_name: krvoiceai-avatar-0, ports: ["8010:8010"], deploy: {resources: {reservations: {devices: [{<<: *gpu-reservation, device_ids: ["0"]}]}}}}
  avatar-1: {<<: *avatar-common, container_name: krvoiceai-avatar-1, ports: ["8011:8010"], deploy: {resources: {reservations: {devices: [{<<: *gpu-reservation, device_ids: ["1"]}]}}}}
  avatar-2: {<<: *avatar-common, container_name: krvoiceai-avatar-2, ports: ["8012:8010"], deploy: {resources: {reservations: {devices: [{<<: *gpu-reservation, device_ids: ["2"]}]}}}}
  avatar-3: {<<: *avatar-common, container_name: krvoiceai-avatar-3, ports: ["8013:8010"], deploy: {resources: {reservations: {devices: [{<<: *gpu-reservation, device_ids: ["3"]}]}}}}
  avatar-4: {<<: *avatar-common, container_name: krvoiceai-avatar-4, ports: ["8014:8010"], deploy: {resources: {reservations: {devices: [{<<: *gpu-reservation, device_ids: ["4"]}]}}}}
  avatar-5: {<<: *avatar-common, container_name: krvoiceai-avatar-5, ports: ["8015:8010"], deploy: {resources: {reservations: {devices: [{<<: *gpu-reservation, device_ids: ["5"]}]}}}}

  # ── 2× CosyVoice2 tts（GPU 6-7）──
  tts-0: {<<: *tts-common, container_name: krvoiceai-tts-0, ports: ["9880:9880"], deploy: {resources: {reservations: {devices: [{<<: *gpu-reservation, device_ids: ["6"]}]}}}}
  tts-1: {<<: *tts-common, container_name: krvoiceai-tts-1, ports: ["9881:9880"], deploy: {resources: {reservations: {devices: [{<<: *gpu-reservation, device_ids: ["7"]}]}}}}

networks:
  krvoiceai-net:
    driver: bridge
