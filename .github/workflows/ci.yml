name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支新推送取消上一次未完成的运行
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      # 视频合成/探测依赖真实 ffmpeg（多数 e2e 测试需要）
      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Install package (dev + offline-friendly extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tts,local,cloud]"

      # 门禁 1：静态检查（select=E,F；忽略 E501；scripts/ 已排除）
      - name: Ruff lint
        run: ruff check --output-format=github .

      # 门禁 2：单元/集成测试
      # 强制所有 provider 走 mock，避免 CI 中触网（edge_tts/LLM/抖音等）
      - name: Pytest
        env:
          KRVOICEAI_TTS_PROVIDER: mock
          KRVOICEAI_ASR_PROVIDER: mock
          KRVOICEAI_AVATAR_PROVIDER: mock
          KRVOICEAI_LLM_PROVIDER: mock
          KRVOICEAI_PIPELINE_GPU_ENABLED: "false"
        run: pytest -q
